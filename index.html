    function _createShortcutItem(item) {
        const _hasIcon = item.icon !== undefined;
        const _icon = _hasIcon ? item.icon : "icon-letter-" + item.name.charAt(0).toLowerCase();
        return `<a tabindex="-1" href="${item.url}" class="shortcut-item" target="_blank">
    <div class="shortcut-icon size-48">
        <svg class="icon size-full">
            <use href="www/icons.svg#${_icon}" xlink:href="www/icons.svg#${_icon}"></use>
        </svg>
    </div>
    <div class="shortcut-title text-small">${item.name}</div>
</a>`;
    }

    function _createCard(card) {
        const _createItem = (item) => {
            const _hasIcon = item.icon !== undefined;
            const _icon = _hasIcon ? item.icon : "icon-letter-" + item.name.charAt(0).toLowerCase();
            return `<div class="card-item">
    <div class="card-item-left">
        <svg class="icon size-18">
            <use href="www/icons.svg#${_icon}" xlink:href="www/icons.svg#${_icon}"></use>
        </svg>
        <a class="card-item-link ${item.large ? "text-large" : "text-normal"}" tabindex="-1" href="${item.url}" target="_blank">${item.name}</a>
    </div>
    ${item.help ? `<a class="card-item-link" tabindex="-1" href="${item.help}" target="_blank">
        <svg class="icon size-14 pointer">
            <use href="www/icons.svg#icon-mark-question" xlink:href="www/icons.svg#icon-mark-question"></use>
        </svg>
    </a>`: ``}
</div>`;
        }

        let itemHTML = "";
        for (const item of card.data) {
            itemHTML += _createItem(item);
        }
        return `<div class="card">
    <div class="size-full" style="background-color:${card.color};">
        <div class="card-title">${card.name}</div>
        <div class="card-content">${itemHTML}</div>
    </div>
</div>`;
    }

    function _calcCardHeight(item) {
        const grid = document.querySelector(".card-container");
        const rowGap = parseInt(window.getComputedStyle(grid).getPropertyValue('grid-row-gap'));
        const rowHeight = parseInt(window.getComputedStyle(grid).getPropertyValue('grid-auto-rows'));
        let contentHeight = item.querySelector('.card-title').getBoundingClientRect().height;
        contentHeight += item.querySelector('.card-content').getBoundingClientRect().height;
        const rowSpan = Math.ceil((contentHeight + rowGap) / (rowHeight + rowGap));
        item.style.gridRowEnd = "span " + rowSpan;
    }

    function _searchGoogle(query) {
        const ipRegex = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/;
        const urlRegex = /^(https?:\/\/)?([\w\-]+\.)+[\w\-]+(:\d+)?(\/\S*)?$/i;

        let _target = "";
        if (ipRegex.test(query)) {
            _target = query.startsWith('http') ? query : `http://${query}`;
        } else if (urlRegex.test(query)) {
            _target = query.match(/^https?:\/\//i) ? query : `http://${query}`;
        } else {
            _target = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        }
        window.open(_target, '_blank');
    }

    function _setupSearch() {
        const _searchContainer = document.getElementById('searchContainer');
        const _inputElem = document.getElementById('searchInput');
        const _MAX_CACHE_SIZE = 10;
        const _SPLITER = "!9!";
        const _CACHE_NAME_ = "jcblog";
        const _searchHistoryData = localStorage.getItem(_CACHE_NAME_)?.split(_SPLITER) ?? [];
        let _historyIndex = - 1;// point to newest;

        _inputElem.addEventListener('keydown', (event) => {
            // console.log("_inputElem", event.key);
            switch (event.key) {
                case "ArrowDown":
                    _inputElem.value = _searchHistoryData.at(_historyIndex) ?? _inputElem.value;
                    _historyIndex++;
                    break;
                case "ArrowUp":
                    _inputElem.value = _searchHistoryData.at(_historyIndex) ?? _inputElem.value;
                    _historyIndex--;
                    break;
                case "Enter":
                    const query = _inputElem.value.trim();
                    if (query) {
                        _searchGoogle(query);
                        const _index = _searchHistoryData.indexOf(query);
                        if (_index < 0) {
                            _searchHistoryData.push(query);
                            if (_searchHistoryData.length > _MAX_CACHE_SIZE) {
                                _searchHistoryData.shift();
                            }
                            _historyIndex = - 1;
                            localStorage.setItem(_CACHE_NAME_, _searchHistoryData.join(_SPLITER));
                        } else {
                            _historyIndex = _index;
                        }
                    }
                case "Escape":
                    _inputElem.value = '';
                    _searchContainer.removeAttribute("focused");
                    break;
                default:
            }
            if (event.key === "ArrowDown" || event.key === "ArrowUp") {
                const _size = _searchHistoryData.length;
                _historyIndex = ((_historyIndex % _size) + _size) % _size;// loop index;
                event.preventDefault();
            }
            event.stopImmediatePropagation();
        });
        document.body.addEventListener("keydown", (event) => {
            // console.log("body", event.key);
            if (event.key === 'Enter') {
                _searchContainer.setAttribute("focused", "");
                _inputElem.focus();
            } else if (event.key == "Escape") {
                _inputElem.value = '';
                _searchContainer.removeAttribute("focused");
            }
        });
    }

    window.onload = () => {
        let _str = "";

        document.getElementById("cardContainer").innerHTML = _str2;

        const allItems = document.querySelectorAll(".card");
        allItems.forEach(_calcCardHeight);

        _setupSearch();
    };
