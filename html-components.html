<!DOCTYPE html>
<html lang="en_US">

<head>
    <meta charset="UTF-8">
    <title>pure CSS components</title>
    <link href="www/favicon.ico" rel="shortcut icon">
    <link rel="stylesheet" href="www/style.css">
    <style>
        details {
            position: relative;
        }

        .custom-dropdown summary {
            list-style: none;
            padding: 2px 2px;
            background: #f8f9fa;
            border: none;
            /* border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center; */
            user-select: none;

            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0px;
        }

        .custom-dropdown summary:hover {
            background-color: #e6e6e6;
        }

        .custom-dropdown summary::-webkit-details-marker {
            display: none;
        }

        .dropdown-content {
            position: absolute;
            top: 100%;
            /* left: 0; */
            right: 0;
            width: 150px;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 4px 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .checkbox-item:hover {
            background-color: #e6e6e6;
        }

        .checkbox-item input {
            margin-right: 10px;
            cursor: pointer;
        }

        .custom-dropdown[open] summary {
            border-bottom: 1px transparent;
            border-radius: 4px 4px 0 0;
            background: #e9ecef;
            background-color: #e6e6e6;
        }
    </style>
</head>

<body>
    <div class="textarea-outer">
        <div class="textarea-head">
            <div class="textarea-caption">
                this is caption of the textarea.
            </div>
            <div role="button" class="textarea-buttons">

                <div role="button" onclick="funcA(this)">
                    <span>Silent On</span>
                </div>
                <div role="button" onclick="funcB()">
                    <span>CLEAR</span>
                </div>
                <div role="button" onclick="funcC('outputElem')">
                    <svg class="icon size-14 svg-color-gray">
                        <use href="./icons.svg#icon-download" xlink:href="./icons.svg#icon-download">
                        </use>
                    </svg>
                    <span>DOWNLOAD</span>
                </div>

                <details role="button" class="custom-dropdown">
                    <summary>
                        <svg class="icon size-14 svg-color-gray">
                            <use href="./icons.svg#icon-menu" xlink:href="./icons.svg#icon-menu"></use>
                        </svg>
                    </summary>
                    <div class="dropdown-content">
                        <label class="checkbox-item">
                            <input type="checkbox" name="option1" id="cb_silent" onchange="silent(true)" checked>
                            Silent Mode
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="option2"> 选项二
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="option3"> 选项三
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="option4"> 选项四
                        </label>
                    </div>
                </details>
            </div>
        </div>
        <textarea class="textarea" spellcheck="false" id="outputElem" oninput="autoResize(this)"
            placeholder="select software above ..."></textarea>
    </div>

    <div id="searchContainer" class="search-container" focused>
        <div class="search size-full">
            <svg class="icon size-50">
                <use href="./icons.svg#icon-google-chrome" xlink:href="./icons.svg#icon-google-chrome">
                </use>
            </svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search with Google or enter address">
        </div>
    </div>

    <div class="tabs">
        <input class="tabs-radio" type="radio" name="mytabs" id="tab1" checked>
        <label class="tabs-label text-normal padding-8-20" for="tab1">SOFTWARE</label>
        <div class="tabs-content">
            Professional: VK7JG-NPHTM-C97JM-9MPGT-3V66T
        </div>

        <input class="tabs-radio" type="radio" name="mytabs" id="tab2">
        <label class="tabs-label text-normal padding-8-20" for="tab2">SYSTEM</label>
        <div class="tabs-content">
            <label for="tab2">SYSTEM</label>
            Enter the product key: The following are generic Windows product keys:
        </div>
    </div>
</body>

<script>
    function autoResize(elem) {
        const _parentElem = elem.parentElement;
        _parentElem.style.height = "auto";
        elem.style.height = "auto";
        const _height = elem.scrollHeight;
        _parentElem.style.height = _height + 18 + 'px';
        elem.style.height = _height + 'px';
    }

    document.addEventListener('mousedown', (e) => {
        const allDetails = document.querySelectorAll('details[open]');

        allDetails.forEach(details => {
            if (!details.contains(e.target)) {
                details.removeAttribute('open');
            }
        });
    });
</script>

</html>
